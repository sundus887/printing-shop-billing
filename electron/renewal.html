<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renew Subscription</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f172a;
      --border:#243145;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --primary:#2563eb;
      --danger:#ef4444;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg, var(--bg), #070c16);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:100%;
      max-width:520px;
      background:rgba(15,23,42,0.9);
      border:1px solid var(--border);
      border-radius:16px;
      padding:22px;
      box-shadow:0 16px 50px rgba(0,0,0,0.55);
    }
    h1{ margin:0 0 8px 0; font-size:20px; letter-spacing:0.2px; }
    p{ margin:0; color:var(--muted); font-size:13px; line-height:1.5; }
    .grid{ margin-top:16px; display:grid; grid-template-columns:1fr; gap:12px; }
    .row{ display:flex; justify-content:space-between; gap:10px; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:rgba(2,6,23,0.35); }
    .label{ color:var(--muted); font-size:12px; }
    .value{ font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:320px; text-align:right; }
    .status{
      margin-top:14px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(2,6,23,0.35);
      font-size:13px;
    }
    .status.bad{ border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.08); }
    .form{ margin-top:14px; display:flex; gap:10px; }
    input{
      flex:1;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0b1220;
      color:var(--text);
      outline:none;
      font-size:13px;
    }
    input::placeholder{ color:#64748b; }
    button{
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(37,99,235,0.55);
      background:var(--primary);
      color:white;
      font-weight:600;
      font-size:13px;
      cursor:pointer;
      min-width:160px;
    }
    button:disabled{ opacity:0.6; cursor:not-allowed; }
    .error{ margin-top:10px; min-height:18px; color:#fca5a5; font-size:12px; }
    .hint{ margin-top:10px; color:var(--muted); font-size:12px; }
    .hint code{ color:#cbd5e1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Renew Subscription</h1>
    <p>Your subscription is required to use this software on this computer.</p>

    <div class="grid">
      <div class="row">
        <div class="label">Expiry Date</div>
        <div class="value" id="expiry">-</div>
      </div>
      <div class="row">
        <div class="label">Days Remaining</div>
        <div class="value" id="days">-</div>
      </div>
      <div class="row">
        <div class="label">Machine ID</div>
        <div class="value" id="machineId">-</div>
      </div>
    </div>

    <div class="status bad" id="status">Checking subscription status...</div>

    <div class="form">
      <input id="key" placeholder="Paste Signed License JSON" autocomplete="off" />
      <button id="renew">Renew Subscription</button>
    </div>

    <div class="form" style="margin-top:10px">
      <button id="pick" style="flex:1" type="button">Select License File</button>
    </div>

    <div class="error" id="error"></div>
    <div class="hint">Paste the signed license JSON provided by the vendor.</div>
  </div>

  <script src="renewal.js"></script>
</body>
</html>
